services:
  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-remindam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-remindam}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-remindam}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI ──
  web:
    build: .
    restart: unless-stopped
    entrypoint: ["bash", "entrypoint.sh"]
    ports:
      - "${PORT:-8001}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remindam}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-remindam}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker ──
  worker:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "app.scheduler", "worker", "--loglevel=info"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remindam}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-remindam}
      REDIS_URL: redis://redis:6379/0
      USE_NULL_POOL: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Beat (Scheduler) ──
  beat:
    build: .
    restart: unless-stopped
    command: ["uv", "run", "celery", "-A", "app.scheduler", "beat", "--loglevel=info"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-remindam}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-remindam}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
