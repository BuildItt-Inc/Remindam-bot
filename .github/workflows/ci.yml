name: Backend CI/CD

on:
  pull_request:
    branches: [dev, main, staging]
  push:
    branches: [main, staging]

jobs:
  # ============================================================================
  # CI - Test, Lint & Check Migrations (OPTIMIZED)
  # ============================================================================
  test:
    name: Test, Lint & Check Migrations
    runs-on: emerj-runner
    # Removed `if: github.event_name == 'pull_request'` so this also runs on push to main/staging
    timeout-minutes: 30

    env:
      DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/watchdog_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: test-secret-key-for-ci
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Use the native setup-uv action which handles installing uv, caching environments
      # via uv.lock, and setting up python all in one step safely.
      - name: Install uv and setup Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      # `uv run` handles the virtual environment resolution locally, removing the
      # need to explicitly run `source .venv/bin/activate` every time.
      - name: Lint with Ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Check Alembic heads
        run: |
          HEAD_COUNT=$(uv run alembic heads | grep "head" | wc -l)
          if [ "$HEAD_COUNT" -gt 1 ]; then
            echo "❌ Multiple Alembic heads detected!"
            uv run alembic heads
            exit 1
          fi
          echo "✅ No multiple heads detected."

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests with Pytest
        run: uv run pytest tests/ --verbose
